<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    Agenda List Template
    Structure: Numbered timeline of 3-6 agenda items, each with title, brief, duration pill
    Use cases: Table of contents, meeting agendas, section dividers, presentation roadmaps
    Design Principles: Vertical timeline anchoring numbered circles; large hero duration in header; sparse content, generous whitespace
    -->
    <defs>
        <linearGradient id="rail" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#6366F1"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- ==================== Header ==================== -->
    <g id="header">
        <rect x="80" y="56" width="4" height="68" rx="2" fill="#3B82F6"/>
        <text x="100" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#0F172A">
            <tspan>Meeting Agenda</tspan>
        </text>
        <text x="100" y="114" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#64748B" letter-spacing="2">
            <tspan>Q3 STRATEGIC ALIGNMENT &amp; REVIEW · MAY 13, 2026</tspan>
        </text>

        <!-- Hero duration badge (right) -->
        <g transform="translate(1010, 50)">
            <rect x="0" y="0" width="180" height="80" rx="14" fill="#EFF6FF"/>
            <text x="90" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#3B82F6" text-anchor="middle">
                <tspan>75</tspan><tspan font-size="20" dx="2">min</tspan>
            </text>
            <text x="90" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" fill="#1E3A8A" text-anchor="middle" letter-spacing="2">
                <tspan>TOTAL DURATION</tspan>
            </text>
        </g>
    </g>

    <!-- Header divider -->
    <line x1="80" y1="160" x2="1200" y2="160" stroke="#E2E8F0" stroke-width="2"/>

    <!-- ==================== Vertical Timeline Rail ==================== -->
    <line x1="130" y1="220" x2="130" y2="620" stroke="url(#rail)" stroke-width="3" stroke-linecap="round"/>

    <!-- ==================== Agenda Items ==================== -->
    <!-- Item 01 -->
    <g id="item-01" transform="translate(0, 200)">
        <!-- Number circle on rail -->
        <circle cx="130" cy="36" r="26" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
        <text x="130" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#3B82F6" text-anchor="middle">
            <tspan>01</tspan>
        </text>
        <!-- Title + brief -->
        <text x="190" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#0F172A">
            <tspan>Executive Summary &amp; Q3 Performance</tspan>
        </text>
        <text x="190" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#64748B">
            <tspan>High-level overview of revenue targets, key metrics, and major wins from the last quarter.</tspan>
        </text>
        <!-- Duration pill (right) -->
        <rect x="1060" y="14" width="120" height="36" rx="18" fill="#EFF6FF"/>
        <text x="1120" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#3B82F6" text-anchor="middle" letter-spacing="1">
            <tspan>10 MIN</tspan>
        </text>
        <!-- Owner -->
        <text x="190" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="1">
            <tspan>OWNER · CEO</tspan>
        </text>
    </g>

    <!-- Item 02 -->
    <g id="item-02" transform="translate(0, 320)">
        <circle cx="130" cy="36" r="26" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
        <text x="130" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#3B82F6" text-anchor="middle">
            <tspan>02</tspan>
        </text>
        <text x="190" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#0F172A">
            <tspan>Product Roadmap Updates</tspan>
        </text>
        <text x="190" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#64748B">
            <tspan>Review of upcoming features, delayed items, and engineering resource allocation.</tspan>
        </text>
        <rect x="1060" y="14" width="120" height="36" rx="18" fill="#EFF6FF"/>
        <text x="1120" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#3B82F6" text-anchor="middle" letter-spacing="1">
            <tspan>20 MIN</tspan>
        </text>
        <text x="190" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="1">
            <tspan>OWNER · VP PRODUCT</tspan>
        </text>
    </g>

    <!-- Item 03 -->
    <g id="item-03" transform="translate(0, 440)">
        <circle cx="130" cy="36" r="26" fill="#FFFFFF" stroke="#5575EC" stroke-width="3"/>
        <text x="130" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#5575EC" text-anchor="middle">
            <tspan>03</tspan>
        </text>
        <text x="190" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#0F172A">
            <tspan>Competitive Market Analysis</tspan>
        </text>
        <text x="190" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#64748B">
            <tspan>Deep dive into recent moves by Competitor A and our strategic response plan.</tspan>
        </text>
        <rect x="1060" y="14" width="120" height="36" rx="18" fill="#EEF2FF"/>
        <text x="1120" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#5575EC" text-anchor="middle" letter-spacing="1">
            <tspan>15 MIN</tspan>
        </text>
        <text x="190" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="1">
            <tspan>OWNER · HEAD OF STRATEGY</tspan>
        </text>
    </g>

    <!-- Item 04 — highlighted as focal -->
    <g id="item-04" transform="translate(0, 560)">
        <circle cx="130" cy="36" r="28" fill="#6366F1"/>
        <text x="130" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">
            <tspan>04</tspan>
        </text>
        <text x="190" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#0F172A">
            <tspan>Q4 Goals &amp; OKR Planning</tspan><tspan dx="10" font-size="11" font-weight="800" fill="#6366F1" letter-spacing="2">· DECISION</tspan>
        </text>
        <text x="190" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#64748B">
            <tspan>Collaborative session to finalize departmental objectives and assign ownership.</tspan>
        </text>
        <rect x="1060" y="14" width="120" height="36" rx="18" fill="#6366F1"/>
        <text x="1120" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
            <tspan>30 MIN</tspan>
        </text>
        <text x="190" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="1">
            <tspan>OWNER · LEADERSHIP TEAM</tspan>
        </text>
    </g>

    <!-- ==================== Footer ==================== -->
    <text x="80" y="695" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#94A3B8">
        <tspan>Presenter: Management Team · Conference Room A · Recorded</tspan>
    </text>
</svg>
