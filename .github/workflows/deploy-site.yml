name: Trigger lixiaolong.me rebuild
on:
  push:
    branches: [main]
    paths:
      - 'README.md'
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to lixiaolong.me
        env:
          GH_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          gh api repos/xlsama/lixiaolong.me/dispatches \
            -f event_type=content-changed \
            -f 'client_payload[source]=${{ github.repository }}' \
            -f 'client_payload[sha]=${{ github.sha }}'
