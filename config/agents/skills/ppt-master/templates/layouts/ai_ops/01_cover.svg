<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

  <!-- Top Red Banner -->
  <rect x="0" y="0" width="1280" height="8" fill="#C00000" />

  <!-- Left Decorative Red Block -->
  <rect x="0" y="0" width="60" height="360" fill="#C00000" />
  <rect x="0" y="360" width="60" height="360" fill="#2E75B6" />

  <!-- Warm Gray Subtitle Band -->
  <rect x="60" y="280" width="1220" height="60" fill="#F2F2F2" />

  <!-- Title Group -->
  <text x="640" y="220" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="56" font-weight="bold" fill="#C00000" text-anchor="middle">{{TITLE}}</text>

  <!-- Subtitle -->
  <text x="640" y="320" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#666666" text-anchor="middle">{{SUBTITLE}}</text>

  <!-- Decorative Numbered Badges (referencing architecture style) -->
  <rect x="200" y="400" width="40" height="40" fill="#C00000" />
  <text x="220" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>

  <rect x="400" y="400" width="40" height="40" fill="#C00000" />
  <text x="420" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>

  <rect x="600" y="400" width="40" height="40" fill="#C00000" />
  <text x="620" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>

  <rect x="800" y="400" width="40" height="40" fill="#C00000" />
  <text x="820" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>

  <rect x="1000" y="400" width="40" height="40" fill="#C00000" />
  <text x="1020" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>

  <!-- Blue Scenario Tags -->
  <rect x="250" y="400" width="120" height="40" fill="#2E75B6" />
  <text x="310" y="427" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">智能运维</text>

  <rect x="450" y="400" width="120" height="40" fill="#2E75B6" />
  <text x="510" y="427" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">数字员工</text>

  <rect x="650" y="400" width="120" height="40" fill="#2E75B6" />
  <text x="710" y="427" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">自动化测试</text>

  <rect x="850" y="400" width="120" height="40" fill="#2E75B6" />
  <text x="910" y="427" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">故障诊断</text>

  <rect x="1050" y="400" width="120" height="40" fill="#2E75B6" />
  <text x="1110" y="427" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">开放共享</text>

  <!-- Dashed Separator -->
  <line x1="120" y1="480" x2="1160" y2="480" stroke="#E7E6E6" stroke-width="1" stroke-dasharray="5 5" />

  <!-- Author & Date -->
  <text x="640" y="560" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">{{AUTHOR}}</text>
  <text x="640" y="600" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#999999" text-anchor="middle">{{DATE}}</text>

  <!-- Bottom Blue Band -->
  <rect x="0" y="690" width="1280" height="30" fill="#2E75B6" />

  <!-- Bottom Warm Accent -->
  <rect x="0" y="680" width="1280" height="10" fill="#FDF3EB" />
</svg>
