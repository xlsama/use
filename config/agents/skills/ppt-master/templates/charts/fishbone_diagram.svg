    <!-- ============ Branch 3: System (Top-Right, Base=790) ============ -->
    <line x1="790" y1="370" x2="690" y2="130" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <rect x="628" y="88" width="124" height="40" rx="20" fill="#F59E0B" filter="url(#cardShadow)"/>
