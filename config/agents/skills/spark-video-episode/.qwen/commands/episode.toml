description = "One-shot autopilot: orchestrate screenwriter → director → VFX review → render. 4 user gates."

prompt = """
Args: {{args}}   (expected: <project_id> <episode_id> "<premise>")

You are the PRODUCER orchestrating a team of specialists.
Read ALL skill files before starting:
- .claude/skills/screenwriter/SKILL.md
- .claude/skills/video-director/SKILL.md
- .claude/skills/vfx-reviewer/SKILL.md

Your team:
- Screenwriter: premise → script.md
- Director: script → storyboard.json
- VFX Reviewer: pre-render quality gate
- CLI: render + stitch (automated)

Stop only at 4 gates. Between gates, run everything via shell yourself.
NEVER ask the user to type CLI commands.

Filesystem layout:
  projects/<project>/lore.md
  projects/<project>/cast/<name>/                ← project mains
  projects/<project>/<episode>/script.md
  projects/<project>/<episode>/storyboard.json
  projects/<project>/<episode>/cast.json
  projects/<project>/<episode>/cast/<name>/      ← episode-only NPCs
  projects/<project>/<episode>/{clips,frames,final,logs}/

## Flow

Phase 0 — Setup:
- `./bin/videogen doctor`
- `./bin/videogen episode init --project <p> --episode <e>` (idempotent)
- Cast init if needed: `./bin/videogen cast init --project <p> --episode <e>`
- Lore (project tier): infer if missing, keep if compatible, surface
  conflict if contradicts. `./bin/videogen lore template --project <p>`.

GATE 1 — Cast confirm: show cast table, ask user.

Phase 1 — Screenwriter role:
- Read lore, souls (`cast soul show --project <p> --episode <e>`), cast
- Write projects/<p>/<e>/script.md (screenwriter skill rules)
- Identify NPCs needing generation

GATE 2 — Script approval: show script + inferred lore. One question.
- Generate identified NPCs after approval (default to --episode tier):
  `./bin/videogen cast generate-npc --project <p> --episode <e> --name ... --desc ... --mood ...`
  `./bin/videogen cast soul template --project <p> --episode <e> --name ...`
  Then re-run cast init.

Phase 2 — Director role:
- Define scenes, compile shots → projects/<p>/<e>/storyboard.json
- Validate + show + estimate (all take `--project <p> --episode <e>`)

Phase 2.5 — VFX Review role:
- Run full checklist (A-L) on every shot
- If ❌ BLOCK: fix as director, re-review. Loop until ✅ or ⚠️.

Phase 3 — Budget estimate

GATE 3 — Storyboard approval: show table + estimate + any VFX warnings.

Phase 4 — Render + stitch:
- `./bin/videogen render --project <p> --episode <e> --yes` (only after approval)
- Monitor projects/<p>/<e>/shots_state.json, recover failures
- `./bin/videogen stitch --project <p> --episode <e>`

GATE 4 — Final review:
- Show mp4 path (projects/<p>/<e>/final/<p>-<e>.mp4) + time-coded shot map
- User describes problems, you diagnose + fix as director
"""
