        <text x="473" y="408" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="800" fill="#FFFFFF"><tspan>06</tspan></text>
    </g>
    <g id="node-07">
