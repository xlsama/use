# ===========================
# Ghostty 完整配置
# ===========================

# 标题栏集成 Tab 栏（比 hidden 多了 Tab 支持）
macos-titlebar-style = tabs

# 非活跃分屏的透明度（让你一眼看出焦点在哪）
unfocused-split-opacity = 0.9

# --- 字体 ---
font-family = "Maple Mono NF CN"
font-size = 13
font-thicken = true

# 连字支持
font-feature = call
font-feature = liga

# --- 窗口行为 ---
confirm-close-surface = false

# 新分屏继承当前目录
window-inherit-working-directory = true

# 新窗口继承字体大小
window-inherit-font-size = true

# 窗口 —— 启动时最大化（占满屏幕可用区，保留菜单栏 / Dock）
# 需 Ghostty ≥ 1.2.0，macOS 上才能正确绘制到最大化尺寸
maximize = true

# 以下为「非最大化」时的默认尺寸，单位是终端网格 cell
# maximize = true 时不生效，仅作为取消最大化后的回落尺寸
window-width = 175
window-height = 55

# 内边距
window-padding-x = 4
window-padding-y = 4
window-padding-balance = true

# --- Shell 集成 ---
# 自动注入 shell 集成（光标样式、sudo、标题、SSH terminfo）
shell-integration-features = cursor,sudo,title,ssh-terminfo,ssh-env

# --- 光标 ---
cursor-style = bar
cursor-style-blink = false

# 鼠标隐藏（打字时自动隐藏鼠标）
mouse-hide-while-typing = true

# 复制时自动去除行尾空格
clipboard-trim-trailing-spaces = true


# Option 键作为 Alt 使用（对 vim/emacs 用户很重要）
macos-option-as-alt = true

# keybind
keybind = alt+h=goto_split:left
keybind = alt+l=goto_split:right
keybind = alt+k=goto_split:up
keybind = alt+j=goto_split:down

auto-update-channel = tip
