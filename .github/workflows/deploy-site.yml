name: Trigger lixiaolong.me rebuild
on:
  push:
    branches: [main]
    paths:
      - 'README.md'
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy
        run: |
          curl -X POST -s -o /dev/null -w "%{http_code}\n" "${{ secrets.CF_DEPLOY_HOOK }}"
