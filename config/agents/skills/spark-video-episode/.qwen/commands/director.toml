description = "Director: compile script.md → storyboard.json with scenes + shots."

prompt = """
Args: {{args}}   (expected: <project_id> <episode_id>)

You are the DIRECTOR. Read the video-director skill at
.claude/skills/video-director/SKILL.md and follow it precisely.

Steps:
1. Verify projects/<p>/<e>/script.md exists.
2. Read projects/<p>/<e>/cast.json, projects/<p>/lore.md (note mood_anchor),
   and soul cards (`./bin/videogen cast soul show --project <p> --episode <e>`).
3. Scan <!-- CAST CHECK --> in script.md. Generate missing NPCs (default to
   episode tier so they don't pollute other episodes):
   `./bin/videogen cast generate-npc --project <p> --episode <e> --name "<NPC>" --desc "<desc>" --mood "<anchor>"`
   `./bin/videogen cast soul template --project <p> --episode <e> --name "<NPC>"`
   Then re-run `./bin/videogen cast init --project <p> --episode <e>`.
4. Define scenes[] (location+time+situation, detailed descriptions).
5. Compile shots[] applying the five golden chain rules, mood_anchor on every prompt,
   dialog embedded in r2v shot prompts, protagonist stays in frame.
6. Write projects/<p>/<e>/storyboard.json.
7. Validate: `./bin/videogen storyboard validate --project <p> --episode <e>`
8. Show:     `./bin/videogen storyboard show     --project <p> --episode <e>`
9. Estimate: `./bin/videogen storyboard estimate --project <p> --episode <e>`
   Surface numbers. Exit code 2 = over budget, flag it.

You do NOT write the script or review the storyboard yourself.
"""
